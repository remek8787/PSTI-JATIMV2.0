<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pelatih - PSTI Jatim</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-slate-50"><div class="max-w-5xl mx-auto p-6"><a href="index.html" class="text-blue-700">← Kembali</a><h1 class="text-3xl font-bold mt-4">Pelatih</h1><div id="list" class="space-y-4 mt-6"></div></div><script>fetch('data/pelatih.json').then(r=>r.json()).then(rows=>{document.getElementById('list').innerHTML=rows.map(x=>`<div class='bg-white rounded-xl p-4 shadow flex gap-4 items-center'><img src='${x.foto||'https://picsum.photos/seed/pelatih/200/200'}' class='w-20 h-20 rounded-full object-cover'><div><h3 class='font-bold'>${x.nama||''}</h3><p class='text-sm text-slate-600'>${x.cabor||''} • ${x.pendidikan||''}</p></div></div>`).join('')}).catch(()=>document.getElementById('list').innerHTML='<p>Gagal memuat data pelatih.</p>');</script></body></html>
