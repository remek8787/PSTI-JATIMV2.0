<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Atlet - PSTI Jatim</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-slate-50"><div class="max-w-6xl mx-auto p-6"><a href="index.html" class="text-blue-700">← Kembali</a><h1 class="text-3xl font-bold mt-4">Data Atlet</h1><div id="grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4 mt-6"></div></div><script>fetch('data/atlit.json').then(r=>r.json()).then(rows=>{document.getElementById('grid').innerHTML=rows.map(x=>`<article class='bg-white rounded-xl p-4 shadow'><img src='${x.foto||'https://picsum.photos/seed/atlet/500/500'}' class='w-full h-48 object-cover rounded-lg'><h3 class='font-bold mt-3'>${x.nama||''}</h3><p class='text-sm text-slate-600'>${x.tempat_lahir||''} ${x.tgl_lahir||''}</p><p class='text-sm mt-2'>${(x.sejarah_singkat||'').slice(0,120)}...</p></article>`).join('')}).catch(()=>document.getElementById('grid').innerHTML='<p>Gagal memuat data atlet.</p>');</script></body></html>
