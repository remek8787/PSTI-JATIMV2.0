<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Klasemen - PSTI Jatim</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-slate-50"><div class="max-w-4xl mx-auto p-6"><a href="index.html" class="text-blue-700">← Kembali</a><h1 class="text-3xl font-bold mt-4">Klasemen</h1><div class="overflow-x-auto mt-6"><table class="min-w-full bg-white rounded-xl overflow-hidden"><thead class="bg-slate-100"><tr><th class='p-2 text-left'>Klub</th><th class='p-2'>Main</th><th class='p-2'>Menang</th><th class='p-2'>Poin</th></tr></thead><tbody id='tb'></tbody></table></div></div><script>fetch('data/klasemen.json').then(r=>r.json()).then(rows=>{document.getElementById('tb').innerHTML=rows.map(x=>`<tr class='border-t'><td class='p-2'>${x.klub}</td><td class='p-2 text-center'>${x.main}</td><td class='p-2 text-center'>${x.menang}</td><td class='p-2 text-center font-bold'>${x.poin}</td></tr>`).join('')}).catch(()=>document.getElementById('tb').innerHTML='<tr><td class="p-2">Gagal memuat</td></tr>');</script></body></html>
