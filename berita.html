<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Berita - PSTI Jatim</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <div class="max-w-6xl mx-auto p-6">
    <a href="index.html" class="text-blue-700">← Kembali</a>
    <div class="flex items-center justify-between mt-4">
      <h1 class="text-3xl font-bold">Berita Terbaru</h1>
      <a href="admin.html" class="text-sm bg-blue-700 text-white px-3 py-2 rounded">+ Tambah dari Admin</a>
    </div>
    <div id="news" class="grid md:grid-cols-3 gap-4 mt-6"></div>
  </div>

  <script>
    const KEY = 'psti_news_custom';
    const getCustomNews = () => { try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch { return []; } };
    const setCustomNews = (arr) => localStorage.setItem(KEY, JSON.stringify(arr));
    const sortByDateDesc = (arr) => arr.sort((a,b)=> new Date(b.date || b.published_at || 0) - new Date(a.date || a.published_at || 0));

    function render(data){
      const html = data.map((n, idx) => {
        const image = (n.image || n.banner || '').replace(/^\//, '') || 'https://picsum.photos/seed/news/800/500';
        const excerpt = (n.excerpt && n.excerpt.trim()) ? n.excerpt : 'Klik sumber untuk membaca informasi lengkap.';
        const shortExcerpt = excerpt.length > 180 ? excerpt.slice(0, 180) + '...' : excerpt;
        const isCustom = !!n.isCustom;
        return `
          <article class='bg-white rounded-xl overflow-hidden shadow'>
            <img src='${image}' class='w-full h-40 object-cover' alt='${n.title || ''}'>
            <div class='p-4'>
              <p class='text-xs text-slate-500'>${n.date || n.published_at || ''}</p>
              <h2 class='font-bold mt-2'>${n.title || ''}</h2>
              <p class='text-sm mt-1 text-slate-600'>${shortExcerpt}</p>
              ${n.source_name ? `<p class='text-xs text-slate-500 mt-2'>Sumber: ${n.source_name}</p>` : ''}
              <div class='mt-2 flex items-center gap-3'>
                ${n.source_url ? `<a href='${n.source_url}' target='_blank' class='text-blue-700 text-sm font-semibold'>Baca selengkapnya →</a>` : ''}
                ${isCustom ? `<button data-delete='${idx}' class='text-xs text-red-600'>Hapus</button>` : ''}
              </div>
            </div>
          </article>`;
      }).join('');
      document.getElementById('news').innerHTML = html;

      document.querySelectorAll('[data-delete]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const i = Number(e.target.getAttribute('data-delete'));
          const custom = getCustomNews();
          const customItems = sortByDateDesc(custom.map(x => ({...x, isCustom:true})));
          const target = sortByDateDesc([...window.baseNews, ...customItems])[i];
          if (!target || !target.isCustom) return;
          const updated = custom.filter(x => x.id !== target.id);
          setCustomNews(updated);
          load();
        });
      });
    }

    async function load(){
      try {
        const base = await fetch('data/berita.json').then(r => r.json());
        window.baseNews = base;
        const custom = getCustomNews().map(x => ({...x, isCustom:true}));
        const merged = sortByDateDesc([...(base||[]), ...custom]);
        render(merged);
      } catch {
        document.getElementById('news').innerHTML = '<p>Gagal memuat data berita.</p>';
      }
    }
    load();
  </script>
</body>
</html>
