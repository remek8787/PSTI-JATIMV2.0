<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Berita - PSTI Jatim</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <div class="max-w-6xl mx-auto p-6">
    <a href="index.html" class="text-blue-700">← Kembali</a>
    <h1 class="text-3xl font-bold mt-4">Berita Terbaru</h1>
    <div id="news" class="grid md:grid-cols-3 gap-4 mt-6"></div>
  </div>

  <script>
    fetch('data/berita.json')
      .then(r => r.json())
      .then(data => {
        const html = data.map(n => {
          const image = (n.image || '').replace(/^\//, '');
          const excerpt = (n.excerpt && n.excerpt.trim()) ? n.excerpt : 'Klik sumber untuk membaca informasi lengkap.';
          const shortExcerpt = excerpt.length > 180 ? excerpt.slice(0, 180) + '...' : excerpt;
          return `
            <article class='bg-white rounded-xl overflow-hidden shadow'>
              <img src='${image}' class='w-full h-40 object-cover' alt='${n.title || ''}'>
              <div class='p-4'>
                <p class='text-xs text-slate-500'>${n.date || ''}</p>
                <h2 class='font-bold mt-2'>${n.title || ''}</h2>
                <p class='text-sm mt-1 text-slate-600'>${shortExcerpt}</p>
                ${n.source_name ? `<p class='text-xs text-slate-500 mt-2'>Sumber: ${n.source_name}</p>` : ''}
                ${n.source_url ? `<a href='${n.source_url}' target='_blank' class='text-blue-700 text-sm font-semibold'>Baca selengkapnya →</a>` : ''}
              </div>
            </article>`;
        }).join('');
        document.getElementById('news').innerHTML = html;
      })
      .catch(() => {
        document.getElementById('news').innerHTML = '<p>Gagal memuat data berita.</p>';
      });
  </script>
</body>
</html>
