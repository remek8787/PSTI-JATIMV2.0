<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Agenda - PSTI Jatim</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-slate-50"><div class="max-w-5xl mx-auto p-6"><a href="index.html" class="text-blue-700">← Kembali</a><h1 class="text-3xl font-bold mt-4">Agenda Kegiatan</h1><div id="list" class="space-y-3 mt-6"></div></div><script>fetch('data/agenda.json').then(r=>r.json()).then(rows=>{document.getElementById('list').innerHTML=rows.map(x=>`<div class='bg-white p-4 rounded-xl shadow'><p class='text-sm text-slate-500'>${x.periode||''}</p><h3 class='font-bold'>${x.kegiatan||''}</h3></div>`).join('')}).catch(()=>document.getElementById('list').innerHTML='<p>Gagal memuat agenda.</p>');</script></body></html>
