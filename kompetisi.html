<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Kompetisi - PSTI Jatim</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-slate-50"><div class="max-w-5xl mx-auto p-6"><a href="index.html" class="text-blue-700">← Kembali</a><h1 class="text-3xl font-bold mt-4">Kompetisi</h1><div id="list" class="space-y-4 mt-6"></div></div><script>fetch('data/kompetisi.json').then(r=>r.json()).then(rows=>{document.getElementById('list').innerHTML=rows.map(x=>`<article class='bg-white rounded-xl p-4 shadow'><h3 class='font-bold'>${x.nama_kegiatan||x.kegiatan||''}</h3><p class='text-sm text-slate-600'>${x.periode||''} • ${x.lokasi||''}</p><p class='mt-2'>${x.deskripsi||''}</p></article>`).join('')}).catch(()=>document.getElementById('list').innerHTML='<p>Gagal memuat kompetisi.</p>');</script></body></html>
