<!doctype html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sponsor - PSTI Jatim</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-slate-50"><div class="max-w-6xl mx-auto p-6"><a href="index.html" class="text-blue-700">← Kembali</a><h1 class="text-3xl font-bold mt-4">Sponsor</h1><div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6"></div></div><script>fetch('data/sponsor.json').then(r=>r.json()).then(rows=>{document.getElementById('grid').innerHTML=rows.map(x=>`<div class='bg-white p-4 rounded-xl shadow'><img src='${x.image||''}' class='w-full h-24 object-contain'><p class='text-sm mt-2 text-center'>${x.name||''}</p></div>`).join('')}).catch(()=>document.getElementById('grid').innerHTML='<p>Gagal memuat sponsor.</p>');</script></body></html>
